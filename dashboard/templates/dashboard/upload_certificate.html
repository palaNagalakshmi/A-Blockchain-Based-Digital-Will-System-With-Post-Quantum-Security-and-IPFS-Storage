<!DOCTYPE html>
<html>
<head>
    <title>Upload Certificate</title>
</head>
<body>

<h2>Upload Death Certificate</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="aadhaar" placeholder="Enter Aadhaar" required><br><br>

    <input type="file" name="certificate_file" required><br><br>

    <button type="submit">Verify</button>
</form>

</body>
</html>
